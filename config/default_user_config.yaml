metrics:
  port: 19091

snapshot:
  enable: true
  path: "/var/sichek/data/snapshot.json"

reporter:
  enable: false  # master switch; flip to true after deploying sichek-collector
  endpoint: "http://sichek-collector.monitoring.svc:38080/api/v1/snapshots"
  interval: 60s
  timeout: 30s
  retry_max: 3
  gzip: true     # keep true unless gzip cannot be decoded upstream

nvidia:
  query_interval: 10s
  cache_size: 5
  enable_metrics: true
  ignored_checkers:
    - "app-clocks"

infiniband:
  query_interval: 10s
  cache_size: 5
  enable_metrics: true
  ignored_checkers:
    - "net_operstate"

gpfs:
  query_interval: 10s
  cache_size: 5
  ignored_checkers: []

cpu:
  query_interval: 10s
  cache_size: 5
  enable_metrics: true

gpuevents:
  query_interval: 10s
  cache_size: 5
  nvsmi: false
  mock: false
  enable_metrics: true
  ignore_namespaces: []
  ignored_checkers: []

podlog:
  query_interval: 10s
  cache_size: 5
  skip_percent: 100
  ignore_namespaces:
    - "kube-system"
    - "monitoring"
    - "fluent"
    - "pingmesh"
    - "rdma-doctor-system"
    - "roce-operator-system"
    - "scitix-system"
    - "stream-mirror"
    - "volcano-system"
    - "default"

dmesg:
  query_interval: 10s
  cache_size: 5
  skip_percent: 100

syslog:
  query_interval: 10s
  cache_size: 5
  skip_percent: 100


nccltest:
  enable: true

