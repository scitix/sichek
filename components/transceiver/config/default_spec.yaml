        thresholds:
          tx_power_margin_db: 1.0
          rx_power_margin_db: 1.0
          temperature_warning_c: 65
          temperature_critical_c: 75
        check_vendor: true
        check_link_errors: true
        approved_vendors:
          - "Mellanox"
          - "NVIDIA"
          - "Innolight"
          - "Hisense"
